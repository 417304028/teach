services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: hermesclaw
      POSTGRES_USER: hermesclaw
      POSTGRES_PASSWORD: hermesclaw
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  app:
    build: .
    environment:
      HERMESCLAW_ADDR: ":8080"
      HERMESCLAW_BASE_URL: "http://localhost:8080"
      HERMESCLAW_DATA_DIR: "/data"
      HERMESCLAW_STORE: "postgres"
      HERMESCLAW_DATABASE_URL: "postgres://hermesclaw:hermesclaw@postgres:5432/hermesclaw?sslmode=disable"
      HERMESCLAW_ADMIN_USER: "admin"
      HERMESCLAW_ADMIN_PASSWORD: "change-me"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      DASHSCOPE_API_KEY: "${DASHSCOPE_API_KEY:-}"
      ONEBOT_HTTP_API: "${ONEBOT_HTTP_API:-}"
      QQ_ALLOWED_IDS: "${QQ_ALLOWED_IDS:-}"
      CLAWBOT_TOKEN: "${CLAWBOT_TOKEN:-}"
    volumes:
      - app_data:/data
      - ./teach:/courseware:ro
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  app_data:
